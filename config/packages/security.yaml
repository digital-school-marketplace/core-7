security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        main:
            lazy: true
            provider: app_user_provider
            access_denied_url: /_error/403
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: listing_index
                username_parameter: email
                password_parameter: password
            logout:
                path: app_logout
                target: app_login

    access_control:
        # Public auth routes
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }

        # Registration is public, everything else on /users requires login
        - { path: ^/users/new, roles: PUBLIC_ACCESS }
        - { path: ^/users/\d+/edit, roles: ROLE_USER }
        - { path: ^/users/\d+, methods: [ GET ], roles: PUBLIC_ACCESS }
        - { path: ^/users/\d+, methods: [ POST ], roles: ROLE_USER }
        - { path: ^/users, roles: ROLE_ADMIN }

        # Categories are admin-only
        - { path: ^/categories, roles: ROLE_ADMIN }

        # Listing mutations require login
        - { path: ^/listings/new, roles: ROLE_USER }
        - { path: ^/listings/\d+/edit, roles: ROLE_USER }
        - { path: ^/listings/\d+, methods: [ POST ], roles: ROLE_USER }

        # Browsing listings is public
        - { path: ^/listings, roles: PUBLIC_ACCESS }
