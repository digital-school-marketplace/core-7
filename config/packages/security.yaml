security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: listing_index
                username_parameter: email
                password_parameter: password
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/users/new, roles: PUBLIC_ACCESS }
        - { path: ^/users, roles: ROLE_USER }
        - { path: ^/listings/new, roles: ROLE_USER }
        - { path: ^/listings/\d+/edit, roles: ROLE_USER }
        - { path: ^/listings/\d+$, methods: [ POST ], roles: ROLE_USER }
        - { path: ^/listings, roles: PUBLIC_ACCESS }
        - { path: ^/categories, roles: ROLE_ADMIN }
